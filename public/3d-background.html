<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>温暖童话绘本 — Planet Slide</title>
<!-- LXGW WenKai 楷体 Web 字体（手机端无楷体系统字体，需加载） -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-lite-webfont@1.1.0/style.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #f5e6d3; }
.scene-3d {
  position: relative; width: 100%; height: 100%;
  overflow: hidden; user-select: none;
  font-family: "Comic Sans MS", "Chalkboard SE", "PingFang SC", "Microsoft YaHei", cursive, sans-serif;
  background: linear-gradient(180deg, #f5e6d3 0%, #f0d4c0 25%, #e8c8d8 55%, #d4c0e8 80%, #b8d0f0 100%);
}
.scene-3d canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
.paper-overlay {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  mix-blend-mode: multiply; opacity: 0.06;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(140,120,100,0.15) 2px, rgba(140,120,100,0.15) 3px),
    repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(140,120,100,0.1) 2px, rgba(140,120,100,0.1) 3px);
  background-size: 4px 4px;
}
.vignette {
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(60,40,30,0.15) 100%);
}
.title-block {
  position: absolute; top: 50%; left: 6%; transform: translateY(-50%);
  z-index: 10; text-align: left; pointer-events: none; max-width: 40%;
}
.title-block h1 {
  font-size: clamp(2.5rem, 5.5vw, 5rem);
  font-weight: 800; margin: 0; letter-spacing: 0.06em; line-height: 1.2;
  color: #3a2f45;
  text-shadow: 2px 2px 0 rgba(255,255,255,0.6), -1px -1px 0 rgba(255,255,255,0.3), 0 4px 12px rgba(100,60,120,0.15);
}
.daily-quote {
  position: absolute;
  bottom: 32%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  pointer-events: none;
  max-width: 30%;
  text-align: center;
  font-family: "LXGW WenKai", "STKaiti", "KaiTi", "华文楷体", "楷体", serif;
}
.daily-quote p {
  font-size: clamp(0.85rem, 1.4vw, 1.1rem);
  color: rgba(210,218,225,0.85);
  line-height: 1.7;
  text-shadow: 0 1px 3px rgba(255,255,255,0.5);
  white-space: nowrap;
  overflow: hidden;
  display: inline-block;
}
.daily-quote p.done {
  white-space: normal;
}
.title-block .subtitle {
  margin-top: 0.6rem; font-size: clamp(1.2rem, 2vw, 1.7rem);
  color: rgba(80,60,90,0.5); letter-spacing: 0.15em; font-weight: 400;
}
.title-block .meta {
  margin-top: 1.8rem; font-size: clamp(1.1rem, 1.8vw, 1.5rem);
  color: rgba(80,60,90,0.6); letter-spacing: 0.05em; font-weight: 500; line-height: 1.8;
}
</style>
<script type="importmap">
{ "imports": { "ogl": "/vendor/ogl/ogl.mjs" }}

<body>
<div class="scene-3d" id="scene3d">
  <div class="paper-overlay"></div>
  <div class="vignette"></div>
  <div class="daily-quote">
    <p id="quote-text"></p>
  </div>
</div>

<script type="module">
import { Renderer, Camera, Transform, Mesh, Program, Texture, Post, Box, Sphere, Cylinder, Plane, Torus } from 'ogl';

const container = document.getElementById('scene3d');
let W = container.clientWidth, H = container.clientHeight;
const _mobile = window.innerWidth < 768;

// ── GLSL Shaders ──
const toonVS = `
attribute vec3 position;
attribute vec3 normal;
attribute vec2 uv;
uniform mat4 modelViewMatrix;
uniform mat4 projectionMatrix;
uniform mat4 modelMatrix;
varying vec3 vNormal;
varying vec2 vUv;
void main() {
  vUv = uv;
  vNormal = normalize(mat3(modelMatrix) * normal);
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}`;

const toonFS = `
precision highp float;
uniform vec3 uColor;
uniform sampler2D tMap;
uniform float uUseMap;
uniform vec2 uUvRepeat;
uniform vec3 uLightDir1;
uniform vec3 uLightColor1;
uniform float uLightIntensity1;
uniform vec3 uLightDir2;
uniform vec3 uLightColor2;
uniform float uLightIntensity2;
uniform vec3 uAmbientColor;
uniform float uExposure;
varying vec3 vNormal;
varying vec2 vUv;
float toonStep(float ndl) {
  float v = ndl * 0.5 + 0.5;
  if (v < 0.25) return 0.314;
  if (v < 0.50) return 0.627;
  if (v < 0.75) return 0.824;
  return 1.0;
}
const mat3 ACESInputMat = mat3(0.59719, 0.07600, 0.02840, 0.35458, 0.90834, 0.13383, 0.04823, 0.01566, 0.83777);
const mat3 ACESOutputMat = mat3(1.60475, -0.10208, -0.00327, -0.53108, 1.10813, -0.07276, -0.08381, -0.00605, 1.07624);
vec3 RRTAndODTFit(vec3 v) {
  vec3 a = v * (v + 0.0245786) - 0.000090537;
  vec3 b = v * (0.983729 * v + 0.4329510) + 0.238081;
  return a / b;
}
vec3 ACESFilmic(vec3 c) {
  c = ACESInputMat * c;
  c = RRTAndODTFit(c);
  c = ACESOutputMat * c;
  return clamp(c, 0.0, 1.0);
}
void main() {
  vec3 n = normalize(vNormal);
  float t1 = toonStep(dot(n, normalize(uLightDir1)));
  float t2 = toonStep(dot(n, normalize(uLightDir2)));
  vec3 base = uColor;
  if (uUseMap > 0.5) base *= texture2D(tMap, vUv * uUvRepeat).rgb;
  vec3 c = base * (uAmbientColor + uLightColor1 * uLightIntensity1 * t1 + uLightColor2 * uLightIntensity2 * t2) * 0.3183;
  c *= uExposure;
  c = ACESFilmic(c);
  c = pow(c, vec3(1.0/2.2));
  gl_FragColor = vec4(c, 1.0);
}`;

const outlineVS = `
attribute vec3 position;
uniform mat4 modelViewMatrix;
uniform mat4 projectionMatrix;
uniform float uOutlineScale;
void main() {
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position * uOutlineScale, 1.0);
}`;

const outlineFS = `
precision highp float;
uniform vec3 uOutlineColor;
void main() { gl_FragColor = vec4(uOutlineColor, 1.0); }`;

const basicVS = `
attribute vec3 position;
uniform mat4 modelViewMatrix;
uniform mat4 projectionMatrix;
void main() { gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`;

const basicFS = `
precision highp float;
uniform vec3 uColor;
uniform float uOpacity;
void main() { gl_FragColor = vec4(uColor, uOpacity); }`;

const sobelFS = `
precision highp float;
uniform sampler2D tMap;
uniform vec2 uResolution;
uniform float uEdgeStrength;
uniform vec3 uEdgeColor;
varying vec2 vUv;
void main() {
  vec4 c = texture2D(tMap, vUv);
  vec2 tx = 1.0 / uResolution;
  float tl=dot(texture2D(tMap,vUv+tx*vec2(-1,1)).rgb,vec3(.299,.587,.114));
  float tp=dot(texture2D(tMap,vUv+tx*vec2(0,1)).rgb,vec3(.299,.587,.114));
  float tr=dot(texture2D(tMap,vUv+tx*vec2(1,1)).rgb,vec3(.299,.587,.114));
  float l=dot(texture2D(tMap,vUv+tx*vec2(-1,0)).rgb,vec3(.299,.587,.114));
  float r=dot(texture2D(tMap,vUv+tx*vec2(1,0)).rgb,vec3(.299,.587,.114));
  float bl=dot(texture2D(tMap,vUv+tx*vec2(-1,-1)).rgb,vec3(.299,.587,.114));
  float bt=dot(texture2D(tMap,vUv+tx*vec2(0,-1)).rgb,vec3(.299,.587,.114));
  float br=dot(texture2D(tMap,vUv+tx*vec2(1,-1)).rgb,vec3(.299,.587,.114));
  float gx=-tl-2.0*l-bl+tr+2.0*r+br;
  float gy=-tl-2.0*tp-tr+bl+2.0*bt+br;
  float ef=smoothstep(0.05,0.15,length(vec2(gx,gy)))*uEdgeStrength;
  gl_FragColor=vec4(mix(c.rgb,uEdgeColor,ef),c.a);
}`;

const bloomFS = `
precision highp float;
uniform sampler2D tMap;
uniform vec2 uResolution;
uniform float uThreshold;
uniform float uStrength;
varying vec2 vUv;
void main() {
  vec3 base = texture2D(tMap, vUv).rgb;
  vec2 px = 1.0 / uResolution;
  vec3 glow = vec3(0.0);
  float wsum = 0.0;
  for (int x = -3; x <= 3; x++) {
    for (int y = -3; y <= 3; y++) {
      float fx = float(x), fy = float(y);
      float w = exp(-(fx*fx + fy*fy) * 0.25);
      vec3 s = texture2D(tMap, vUv + vec2(fx, fy) * px * 2.5).rgb;
      float l = dot(s, vec3(0.2126, 0.7152, 0.0722));
      glow += s * smoothstep(uThreshold, uThreshold + 0.06, l) * w;
      wsum += w;
    }
  }
  glow /= wsum;
  gl_FragColor = vec4(base + glow * uStrength, 1.0);
}`;

// ── Renderer ──
const renderer = new Renderer({ antialias: true, dpr: Math.min(devicePixelRatio, 2), alpha: false });
const gl = renderer.gl;
gl.clearColor(0.96, 0.90, 0.83, 1.0);
renderer.setSize(W, H);
container.insertBefore(gl.canvas, container.firstChild);

// ── Camera ──
const camera = new Camera(gl, { fov: 45, near: 1, far: 2000, aspect: W / H });
camera.position.set(0, 50, 350);

// ── Scene ──
const scene = new Transform();

// ── Shared light uniforms (update once for all meshes) ──
// Dummy 1x1 white texture for non-textured meshes
const dummyCvs = document.createElement('canvas'); dummyCvs.width = 1; dummyCvs.height = 1;
dummyCvs.getContext('2d').fillStyle = '#fff'; dummyCvs.getContext('2d').fillRect(0, 0, 1, 1);
const dummyTex = new Texture(gl, { image: dummyCvs });
const sharedLight = {
  uLightDir1: { value: [0.5, 0.75, 1.0] },
  uLightColor1: { value: [1.0, 0.933, 0.867] },
  uLightIntensity1: { value: 1.2 },
  uLightDir2: { value: [-0.5, -0.25, 0.5] },
  uLightColor2: { value: [0.831, 0.753, 0.941] },
  uLightIntensity2: { value: 0.4 },
  uAmbientColor: { value: _mobile ? [0.9, 0.864, 0.81] : [0.6, 0.576, 0.54] },
  uExposure: { value: 1.4 },
};

// ── Helpers ──
function hex(h) { return [(h >> 16 & 255) / 255, (h >> 8 & 255) / 255, (h & 255) / 255]; }

function toon(geometry, color, outlineW = 2, opts = {}) {
  const group = new Transform();
  const prog = new Program(gl, {
    vertex: toonVS, fragment: toonFS,
    uniforms: {
      uColor: { value: hex(color) },
      uUseMap: { value: opts.useMap ? 1.0 : 0.0 },
      tMap: { value: opts.map || dummyTex },
      uUvRepeat: { value: opts.uvRepeat || [1, 1] },
      uLightDir1: sharedLight.uLightDir1,
      uLightColor1: sharedLight.uLightColor1,
      uLightIntensity1: sharedLight.uLightIntensity1,
      uLightDir2: sharedLight.uLightDir2,
      uLightColor2: sharedLight.uLightColor2,
      uLightIntensity2: sharedLight.uLightIntensity2,
      uAmbientColor: sharedLight.uAmbientColor,
      uExposure: sharedLight.uExposure,
    },
    cullFace: opts.doubleSide ? null : gl.BACK,
    depthTest: true,
    transparent: !!opts.transparent,
  });
  const mesh = new Mesh(gl, { geometry, program: prog });
  mesh.setParent(group);

  if (outlineW > 0 && !opts.noOutline) {
    const oProg = new Program(gl, {
      vertex: outlineVS, fragment: outlineFS,
      uniforms: {
        uOutlineScale: { value: 1 + outlineW * 0.01 },
        uOutlineColor: { value: [0.227, 0.184, 0.271] },
      },
      cullFace: gl.FRONT,
      depthTest: true,
    });
    const oMesh = new Mesh(gl, { geometry, program: oProg });
    oMesh.setParent(group);
  }
  return group;
}

function basicMesh(geometry, color, opts = {}) {
  const prog = new Program(gl, {
    vertex: basicVS, fragment: basicFS,
    uniforms: {
      uColor: { value: hex(color) },
      uOpacity: { value: opts.opacity !== undefined ? opts.opacity : 1.0 },
    },
    cullFace: opts.doubleSide ? null : gl.BACK,
    depthTest: true,
    transparent: opts.opacity !== undefined && opts.opacity < 1,
  });
  return new Mesh(gl, { geometry, program: prog });
}

// ── Half-sphere Farmland Hill ──
const hillGeo = new Sphere(gl, { radius: 300, widthSegments: 48, heightSegments: 24, thetaLength: Math.PI / 2 });
const farmCanvas = document.createElement('canvas');
farmCanvas.width = 512; farmCanvas.height = 512;
const farmCtx = farmCanvas.getContext('2d');
farmCtx.fillStyle = '#B6794F'; farmCtx.fillRect(0, 0, 512, 512);
let seed = 42;
function sRand() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }
farmCtx.fillStyle = '#c4a55a'; farmCtx.font = 'bold 80px "Courier New", monospace';
farmCtx.textAlign = 'center'; farmCtx.textBaseline = 'middle';
farmCtx.fillText('PLANET', 256, 180);
farmCtx.font = 'bold 120px "Courier New", monospace'; farmCtx.fillText('07', 256, 310);
farmCtx.strokeStyle = 'rgba(160,140,100,0.35)'; farmCtx.lineWidth = 2;
for (let i = 0; i < 8; i++) {
  farmCtx.beginPath(); let px = sRand() * 512, py = sRand() * 512; farmCtx.moveTo(px, py);
  for (let j = 0; j < 6; j++) { px += (sRand()-0.5)*150; py += (sRand()-0.5)*150; farmCtx.quadraticCurveTo(px+(sRand()-0.5)*40, py+(sRand()-0.5)*40, px, py); }
  farmCtx.stroke();
}
const farmTex = new Texture(gl, { image: farmCanvas, wrapS: gl.REPEAT, wrapT: gl.REPEAT });
const hill = toon(hillGeo, 0xffffff, 0, { useMap: true, map: farmTex, uvRepeat: [3, 2], noOutline: true });
hill.position.set(0, -293, 0); hill.setParent(scene);

// Small crop patches / hay bales on hill
const bushPositions = [{ x: -80, z: 60, s: 1.0 }, { x: -55, z: 80, s: 0.7 }, { x: 70, z: 90, s: 0.8 }, { x: 110, z: 50, s: 0.6 }];
for (const bp of bushPositions) {
  const bushG = new Transform();
  const bale = toon(new Cylinder(gl, { radiusTop: 5, radiusBottom: 5, height: 6, radialSegments: 8 }), 0xd4a843, 1.5);
  bale.rotation.x = Math.PI / 2; bale.rotation.z = Math.random() * 0.3; bale.setParent(bushG);
  const patch = toon(new Sphere(gl, { radius: 4, widthSegments: 6, heightSegments: 4 }), 0x7a9e3e, 1.2);
  patch.position.set(6, -1, 2); patch.scale.set(1.2, 0.5, 1); patch.setParent(bushG);
  const surfaceY = Math.sqrt(Math.max(0, 300*300 - bp.x*bp.x - bp.z*bp.z)) - 293;
  bushG.position.set(bp.x, Math.max(surfaceY, 0) - 1, bp.z); bushG.scale.set(bp.s, bp.s, bp.s); bushG.setParent(scene);
}

// ── Tree ──
const tree = new Transform(); tree.position.set(20, 5, 0);
const trunk = toon(new Cylinder(gl, { radiusTop: 6, radiusBottom: 10, height: 80, radialSegments: 10 }), 0x9B7872, 2);
trunk.position.y = 40; trunk.setParent(tree);
for (let i = 0; i < 3; i++) {
  const angle = (i / 3) * Math.PI * 2 + 0.3;
  const root = toon(new Cylinder(gl, { radiusTop: 2, radiusBottom: 4, height: 20, radialSegments: 6 }), 0x8d6e63, 1.5);
  root.position.set(Math.cos(angle)*10, 3, Math.sin(angle)*8);
  root.rotation.z = Math.cos(angle)*0.6; root.rotation.x = Math.sin(angle)*0.3; root.setParent(tree);
}
const canopyPuffs = [];
const canopyData = [
  { x: 0, y: 90, z: 0, r: 35 }, { x: 22, y: 95, z: 8, r: 28 }, { x: -20, y: 92, z: -5, r: 30 },
  { x: 10, y: 105, z: -10, r: 24 }, { x: -10, y: 100, z: 10, r: 26 }, { x: 25, y: 82, z: -8, r: 22 },
  { x: -22, y: 85, z: 5, r: 20 }, { x: 0, y: 108, z: 5, r: 20 }, { x: 15, y: 78, z: 12, r: 18 },
];
for (let i = 0; i < canopyData.length; i++) {
  const c = canopyData[i];
  const puff = toon(new Sphere(gl, { radius: c.r, widthSegments: 12, heightSegments: 8 }), i % 2 === 0 ? 0x81c784 : 0x66bb6a, 1.5);
  puff.position.set(c.x, c.y, c.z);
  puff.userData = { baseY: c.y, speed: 0.3 + Math.random() * 0.2, amp: 1 + Math.random() * 1.5 };
  puff.setParent(tree); canopyPuffs.push(puff);
}
tree.setParent(scene);

// ── Robot ──
const robot = new Transform(); robot.position.set(35, 20, 12); robot.rotation.y = 1.2;
const body = toon(new Box(gl, { width: 18, height: 22, depth: 14 }), 0x96B1C6, 2);
body.rotation.x = -0.12; body.setParent(robot);
const head = toon(new Sphere(gl, { radius: 10, widthSegments: 12, heightSegments: 10 }), 0xd5dde3, 2);
head.position.y = 20; head.rotation.x = -0.2; head.setParent(robot);
const antenna = toon(new Cylinder(gl, { radiusTop: 0.8, radiusBottom: 0.8, height: 8, radialSegments: 6 }), 0xffe082, 1.5);
antenna.position.set(0, 28, 0); antenna.setParent(robot);
const antBall = toon(new Sphere(gl, { radius: 2, widthSegments: 8, heightSegments: 6 }), 0xffe082, 1.5);
antBall.position.set(0, 33, 0); antBall.setParent(robot);

const lidPivotsU = [], lidPivotsL = [];
const LID_OPEN = Math.PI / 3.2;
for (const side of [-1, 1]) {
  const eye = basicMesh(new Sphere(gl, { radius: 2.0, widthSegments: 8, heightSegments: 6 }), 0xffffff);
  eye.position.set(side * 4, 19, 9); eye.scale.set(1, 1, 0.6); eye.setParent(robot);
  const pupil = basicMesh(new Sphere(gl, { radius: 0.9, widthSegments: 6, heightSegments: 4 }), 0x1a237e);
  pupil.position.set(side * 4, 18.5, 10.0); pupil.scale.set(1, 1, 0.6); pupil.setParent(robot);
  const upPivot = new Transform(); upPivot.position.set(side * 4, 19, 9);
  const upper = toon(new Sphere(gl, { radius: 2.1, widthSegments: 16, heightSegments: 10, thetaLength: Math.PI / 2 }), 0xc8a8e9, 0, { doubleSide: true });
  upper.setParent(upPivot); upPivot.scale.set(1, 1, 0.6); upPivot.rotation.x = -LID_OPEN; upPivot.setParent(robot); lidPivotsU.push(upPivot);
  const loPivot = new Transform(); loPivot.position.set(side * 4, 19, 9);
  const lower = toon(new Sphere(gl, { radius: 2.1, widthSegments: 16, heightSegments: 10, thetaStart: Math.PI / 2, thetaLength: Math.PI / 2 }), 0xc8a8e9, 0, { doubleSide: true });
  lower.setParent(loPivot); loPivot.scale.set(1, 1, 0.6); loPivot.rotation.x = LID_OPEN; loPivot.setParent(robot); lidPivotsL.push(loPivot);
  const brow = toon(new Box(gl, { width: 4.5, height: 1.2, depth: 1.2 }), 0x8d6e63, 1.5);
  brow.position.set(side * 4, 23, 9); brow.rotation.z = side * 0.15; brow.setParent(robot);
}

// Heart — simplified as two spheres + cone
const heartGroup = new Transform();
const heartColor = 0xef5350;
const hBump = toon(new Sphere(gl, { radius: 1.8, widthSegments: 8, heightSegments: 6 }), heartColor, 1);
const hL = hBump; hL.position.set(-1.2, 1.2, 0); hL.setParent(heartGroup);
const hR = toon(new Sphere(gl, { radius: 1.8, widthSegments: 8, heightSegments: 6 }), heartColor, 1);
hR.position.set(1.2, 1.2, 0); hR.setParent(heartGroup);
const hCone = toon(new Cylinder(gl, { radiusTop: 2.2, radiusBottom: 0, height: 3, radialSegments: 8 }), heartColor, 1);
hCone.position.set(0, -0.5, 0); hCone.setParent(heartGroup);
heartGroup.position.set(0, 2, 8); heartGroup.scale.set(0.6, 0.6, 0.6); heartGroup.setParent(robot);

for (const side of [-1, 1]) {
  const arm = toon(new Cylinder(gl, { radiusTop: 2.5, radiusBottom: 2.5, height: 17, radialSegments: 6 }), 0x96B1C6, 1.5);
  arm.position.set(side * 11, -3, 5); arm.rotation.x = -1.0; arm.rotation.z = side * 0.4; arm.setParent(robot);
  const hand = toon(new Sphere(gl, { radius: 3, widthSegments: 8, heightSegments: 6 }), 0xd5dde3, 1.5);
  hand.position.set(side * 7, -10, 12); hand.setParent(robot);
  const leg = toon(new Cylinder(gl, { radiusTop: 3, radiusBottom: 3, height: 20, radialSegments: 6 }), 0x96B1C6, 1.5);
  leg.position.set(side * 6, -10, 3); leg.rotation.x = -Math.PI / 2; leg.setParent(robot);
  const foot = toon(new Sphere(gl, { radius: 3.5, widthSegments: 8, heightSegments: 6 }), 0x8d6e63, 1.5);
  foot.position.set(side * 6, -10, 16); foot.setParent(robot);
}

// ── Book in robot's lap ──
const book = new Transform();
const CW = 11, CH = 15, CT = 0.6, OPEN_ANGLE = 0.4;
// Spine
const spine = toon(new Box(gl, { width: CT * 2, height: CH, depth: 2.5 }), 0xc62828, 1.5);
spine.setParent(book);
// Back cover
const bcPivot = new Transform();
const bcMesh = toon(new Box(gl, { width: CW, height: CH, depth: CT }), 0xd32f2f, 1.5);
bcMesh.position.set(-CW/2, 0, 0); bcMesh.setParent(bcPivot); bcPivot.rotation.y = OPEN_ANGLE; bcPivot.setParent(book);
// Front cover
const fcPivot = new Transform();
const fcMesh = toon(new Box(gl, { width: CW, height: CH, depth: CT }), 0xd32f2f, 1.5);
fcMesh.position.set(CW/2, 0, 0); fcMesh.setParent(fcPivot); fcPivot.rotation.y = -OPEN_ANGLE; fcPivot.setParent(book);
// Left pages
const lpPivot = new Transform();
const lpMesh = toon(new Box(gl, { width: CW-1, height: CH-1, depth: 1.8 }), 0xfff8e1, 1);
lpMesh.position.set(-CW/2, 0, 0); lpMesh.setParent(lpPivot); lpPivot.rotation.y = OPEN_ANGLE*0.95; lpPivot.setParent(book);
// Right pages
const rpPivot = new Transform();
const rpMesh = toon(new Box(gl, { width: CW-1, height: CH-1, depth: 1.2 }), 0xfff8e1, 1);
rpMesh.position.set(CW/2, 0, 0); rpMesh.setParent(rpPivot); rpPivot.rotation.y = -OPEN_ANGLE*0.95; rpPivot.setParent(book);
// Spread pages (DoubleSide)
const lsPivot = new Transform();
const lsMesh = toon(new Plane(gl, { width: CW-1.5, height: CH-2 }), 0xfffef5, 0, { doubleSide: true });
lsMesh.position.set(-CW/2+0.3, 0, 0); lsMesh.setParent(lsPivot); lsPivot.rotation.y = OPEN_ANGLE*0.9; lsPivot.position.y = 0.1; lsPivot.setParent(book);
const rsPivot = new Transform();
const rsMesh = toon(new Plane(gl, { width: CW-1.5, height: CH-2 }), 0xfffef5, 0, { doubleSide: true });
rsMesh.position.set(CW/2-0.3, 0, 0); rsMesh.setParent(rsPivot); rsPivot.rotation.y = -OPEN_ANGLE*0.9; rsPivot.position.y = 0.1; rsPivot.setParent(book);
// Page lines
for (let p = 0; p < 2; p++) {
  const pivot = p === 0 ? lsPivot : rsPivot;
  const baseX = p === 0 ? (-CW/2+0.3) : (CW/2-0.3);
  for (let i = 0; i < 6; i++) {
    const lm = basicMesh(new Plane(gl, { width: 4+Math.random()*4, height: 0.25 }), 0xc8b8a8, { doubleSide: true, opacity: 0.4 });
    lm.position.set(baseX, 4-i*1.6, 0.1); lm.setParent(pivot);
  }
}
// Turning page
const turnPagePivot = new Transform(); turnPagePivot.position.set(0, 0.2, 0);
const turningPage = toon(new Plane(gl, { width: CW-1.5, height: CH-2 }), 0xfff8e1, 0, { doubleSide: true });
turningPage.position.set(CW/2-0.3, 0, 0); turningPage.setParent(turnPagePivot); turnPagePivot.setParent(book);
// Bookmark ribbon (thin box approximation)
const ribbon = toon(new Box(gl, { width: 0.6, height: 4, depth: 0.6 }), 0xef5350, 1);
ribbon.position.set(0.5, CH/2+3, -0.2); ribbon.rotation.z = 0.3; ribbon.setParent(book);

book.position.set(0, -7, 9); book.rotation.x = -1.25; book.rotation.z = 0.05; book.setParent(robot);
robot.setParent(scene);

// ── Floating decorations ──
const floaters = [];
function miniBook(color) { const g = new Transform(); const b = toon(new Box(gl, { width: 5, height: 7, depth: 1.5 }), color, 1.5); b.setParent(g); return g; }
function gear(size) {
  const g = new Transform();
  const t = toon(new Torus(gl, { radius: size, tube: size*0.25, radialSegments: 8, tubularSegments: 16 }), 0xffe082, 1.5);
  t.setParent(g);
  for (let i = 0; i < 8; i++) { const a = (i/8)*Math.PI*2; const tooth = toon(new Box(gl, { width: size*0.3, height: size*0.3, depth: size*0.4 }), 0xffe082, 1); tooth.position.set(Math.cos(a)*(size+size*0.15), Math.sin(a)*(size+size*0.15), 0); tooth.rotation.z = a; tooth.setParent(g); }
  return g;
}
function bulb() { const g = new Transform(); const b = toon(new Sphere(gl, { radius: 4, widthSegments: 10, heightSegments: 8 }), 0xffe082, 1.5); b.position.y = 3; b.setParent(g); const base = toon(new Cylinder(gl, { radiusTop: 2, radiusBottom: 2.5, height: 4, radialSegments: 8 }), 0xffcc80, 1.5); base.setParent(g); return g; }

const floaterDefs = [
  { obj: miniBook(0xce93d8), x: -100, y: 100, z: -40, or: 120, os: 0.06, bs: 0.4, ba: 5, ss: 0.01 },
  { obj: miniBook(0x81d4fa), x: 120, y: 110, z: -30, or: 140, os: -0.04, bs: 0.35, ba: 6, ss: 0.008 },
  { obj: gear(5), x: 100, y: 85, z: -20, or: 100, os: 0.05, bs: 0.3, ba: 4, ss: 0.02 },
  { obj: bulb(), x: 80, y: 120, z: 30, or: 90, os: 0.04, bs: 0.5, ba: 6, ss: 0.008 },
];
for (const d of floaterDefs) {
  d.obj.position.set(d.x, d.y, d.z);
  d.obj.userData = { baseY: d.y, ocx: 20, ocz: 0, orbitR: d.or, orbitSpeed: d.os, bobSpeed: d.bs, bobAmp: d.ba, spinSpeed: d.ss, phase: Math.random()*Math.PI*2 };
  d.obj.setParent(scene); floaters.push(d.obj);
}

// ── Clouds ──
const clouds = [];
for (const c of [{ x: -250, y: 150, z: -200, s: 1.0, sp: 0.07 }, { x: 280, y: 135, z: -250, s: 1.3, sp: 0.05 }]) {
  const cloud = new Transform();
  for (const p of [{ r: 30, x: 0, y: 0, z: 0 }, { r: 24, x: 28, y: 5, z: 5 }, { r: 22, x: -25, y: 3, z: -3 }, { r: 18, x: 15, y: 12, z: -8 }, { r: 20, x: -12, y: 10, z: 6 }]) {
    const puff = toon(new Sphere(gl, { radius: p.r, widthSegments: 12, heightSegments: 8 }), 0xF8F3DE, 1.5);
    puff.position.set(p.x, p.y, p.z); puff.setParent(cloud);
  }
  cloud.position.set(c.x, c.y, c.z); cloud.scale.set(c.s, c.s, c.s); cloud.userData = { bx: c.x, by: c.y, sp: c.sp };
  cloud.setParent(scene); clouds.push(cloud);
}

// ── Post Processing (Bloom + Sobel edge detection) ──
const post = new Post(gl);
let bloomPass = null;
if (!_mobile) {
  bloomPass = post.addPass({
    fragment: bloomFS,
    uniforms: {
      uResolution: { value: [W, H] },
      uThreshold: { value: 0.7 },
      uStrength: { value: 0.5 },
    },
  });
}
const sobelPass = post.addPass({
  fragment: sobelFS,
  uniforms: {
    uResolution: { value: [W, H] },
    uEdgeStrength: { value: _mobile ? 0.15 : 0.35 },
    uEdgeColor: { value: [0.227, 0.184, 0.271] },
  },
});

// ── Time-of-day brightness sync ──
function getSunAltitude() {
  const h = new Date().getHours() + new Date().getMinutes() / 60;
  if (h < 5 || h > 19) return 0;
  if (h < 6) return (h - 5);
  if (h > 18) return (19 - h);
  return Math.sin((h - 6) / 12 * Math.PI);
}

function lerpColor(a, b, t) {
  const pa = [parseInt(a.slice(1,3),16), parseInt(a.slice(3,5),16), parseInt(a.slice(5,7),16)];
  const pb = [parseInt(b.slice(1,3),16), parseInt(b.slice(3,5),16), parseInt(b.slice(5,7),16)];
  const r = Math.round(pa[0]+(pb[0]-pa[0])*t), g = Math.round(pa[1]+(pb[1]-pa[1])*t), bl = Math.round(pa[2]+(pb[2]-pa[2])*t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${bl.toString(16).padStart(2,'0')}`;
}

function applyTimeBrightness() {
  const alt = getSunAltitude();
  const day = 0.4 + 0.6 * alt;
  if (_mobile) {
    sharedLight.uExposure.value = 0.7 + 1.0 * day;
    sharedLight.uLightIntensity1.value = 0.5 + 1.2 * day;
    sharedLight.uLightIntensity2.value = 0.2 + 0.5 * day;
  } else {
    sharedLight.uExposure.value = 0.6 + 0.8 * day;
    sharedLight.uLightIntensity1.value = 0.4 + 1.0 * day;
    sharedLight.uLightIntensity2.value = 0.15 + 0.35 * day;
  }
  // Update CSS background gradient
  if (alt < 0.15) {
    const f = alt / 0.15;
    container.style.background = `linear-gradient(180deg, ${lerpColor('#2a2540','#f5e6d3',f)} 0%, ${lerpColor('#1e1a30','#e8c8d8',f)} 55%, ${lerpColor('#141225','#b8d0f0',f)} 100%)`;
  } else {
    container.style.background = 'linear-gradient(180deg, #f5e6d3 0%, #f0d4c0 25%, #e8c8d8 55%, #d4c0e8 80%, #b8d0f0 100%)';
  }
}
applyTimeBrightness();
setInterval(applyTimeBrightness, 60000);

// ── Mouse Drag Orbit ──
let isDragging = false, prevMX = 0, prevMY = 0;
let orbitH = 0, orbitH_target = 0;
let orbitV = 0.35, orbitV_target = 0.35;
const OC = [20, 35, 0];
const ORBIT_RADIUS = _mobile ? 480 : 350;

container.addEventListener('mousedown', (e) => { isDragging = true; prevMX = e.clientX; prevMY = e.clientY; });
window.addEventListener('mousemove', (e) => {
  if (isDragging) {
    orbitH_target -= (e.clientX - prevMX) * 0.005;
    orbitV_target -= (e.clientY - prevMY) * 0.003;
    orbitV_target = Math.max(0.05, Math.min(0.7, orbitV_target));
    prevMX = e.clientX; prevMY = e.clientY;
  }
});
window.addEventListener('mouseup', () => { isDragging = false; });
container.addEventListener('touchstart', (e) => { if (e.touches.length === 1) { isDragging = true; prevMX = e.touches[0].clientX; prevMY = e.touches[0].clientY; } });
window.addEventListener('touchmove', (e) => {
  if (isDragging && e.touches.length === 1) {
    orbitH_target -= (e.touches[0].clientX - prevMX) * 0.005;
    orbitV_target -= (e.touches[0].clientY - prevMY) * 0.003;
    orbitV_target = Math.max(0.05, Math.min(0.7, orbitV_target));
    prevMX = e.touches[0].clientX; prevMY = e.touches[0].clientY;
  }
});
window.addEventListener('touchend', () => { isDragging = false; });

// ── Keyboard (WASD) ──
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup', e => { keys[e.key] = false; });

// ── Animation ──
let nextPageFlip = 4, pageFlipProgress = -1;
let nextBlinkAt = 3, blinkProgress = -1;
const startTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const t = (performance.now() - startTime) / 1000;

  if (keys['a'] || keys['A']) orbitH_target -= 0.02;
  if (keys['d'] || keys['D']) orbitH_target += 0.02;
  if (keys['w'] || keys['W']) orbitV_target -= 0.012;
  if (keys['s'] || keys['S']) orbitV_target += 0.012;
  orbitV_target = Math.max(0.05, Math.min(0.7, orbitV_target));

  orbitH += (orbitH_target - orbitH) * 0.1;
  orbitV += (orbitV_target - orbitV) * 0.1;

  const yAngle = orbitV * Math.PI * 0.5;
  camera.position.set(
    OC[0] + Math.sin(orbitH) * Math.cos(yAngle) * ORBIT_RADIUS,
    OC[1] + Math.sin(yAngle) * ORBIT_RADIUS,
    OC[2] + Math.cos(orbitH) * Math.cos(yAngle) * ORBIT_RADIUS
  );
  camera.lookAt(OC);

  // Canopy float
  for (const puff of canopyPuffs) puff.position.y = puff.userData.baseY + Math.sin(t * puff.userData.speed + puff.userData.amp) * puff.userData.amp;
  // Breathe
  robot.position.y = 20 + Math.sin(t * 0.8) * 1.0;
  // Blink
  if (blinkProgress < 0 && t > nextBlinkAt) blinkProgress = 0;
  let blinkAmt = 0;
  if (blinkProgress >= 0) {
    const half = blinkProgress < 0.5 ? blinkProgress * 2 : 1 - (blinkProgress - 0.5) * 2;
    blinkAmt = half * half * (3 - 2 * half); blinkProgress += 0.07;
    if (blinkProgress >= 1) { blinkProgress = -1; nextBlinkAt = t + (Math.random() < 0.2 ? 0.18 : 2.5 + Math.random() * 3.5); }
  }
  for (const p of lidPivotsU) p.rotation.x = -LID_OPEN * (1 - blinkAmt);
  for (const p of lidPivotsL) p.rotation.x = LID_OPEN * (1 - blinkAmt);
  // Page flip
  if (t > nextPageFlip && pageFlipProgress < 0) pageFlipProgress = 0;
  if (pageFlipProgress >= 0) {
    pageFlipProgress += 0.02;
    const ease = 1 - Math.pow(1 - Math.min(pageFlipProgress, 1), 3);
    turnPagePivot.rotation.y = -OPEN_ANGLE + ease * (-Math.PI + OPEN_ANGLE * 2);
    if (pageFlipProgress >= 1.3) { pageFlipProgress = -1; turnPagePivot.rotation.y = -OPEN_ANGLE; nextPageFlip = t + 4 + Math.random() * 2; }
  }
  // Floaters
  for (const f of floaters) {
    const d = f.userData; const ang = t * d.orbitSpeed + d.phase;
    f.position.x = d.ocx + Math.cos(ang) * d.orbitR;
    f.position.z = d.ocz + Math.sin(ang) * d.orbitR * 0.4;
    f.position.y = d.baseY + Math.sin(t * d.bobSpeed + d.phase) * d.bobAmp;
    f.rotation.y += d.spinSpeed;
  }
  // Clouds
  for (const c of clouds) { c.position.x = c.userData.bx + Math.sin(t * c.userData.sp) * 30; }

  post.render({ scene, camera });
}
animate();

window.addEventListener('resize', () => {
  W = container.clientWidth; H = container.clientHeight;
  camera.perspective({ aspect: W / H });
  renderer.setSize(W, H);
  post.resize();
  sobelPass.uniforms.uResolution.value = [W, H];
  if (bloomPass) bloomPass.uniforms.uResolution.value = [W, H];
});

// === Daily Quote with Typewriter Effect ===
async function initQuote() {
  const fallback = ["简单是终极的复杂。"];
  let quotes = fallback;
  try {
    const res = await fetch('/quotes.json?t=' + new Date().toISOString().slice(0,10));
    if (res.ok) {
      const data = await res.json();
      quotes = data.zh && data.zh.length > 0 ? data.zh : fallback;
    }
  } catch (e) { /* use fallback */ }
  const today = new Date();
  const idx = (today.getFullYear() * 366 + today.getMonth() * 31 + today.getDate()) % quotes.length;
  const target = quotes[idx];
  const el = document.getElementById('quote-text');
  let ci = 0;
  function typeNext() {
    if (!el) return;
    if (ci <= target.length) {
      el.textContent = target.slice(0, ci);
      ci++;
      setTimeout(typeNext, 60 + Math.random() * 40);
    } else {
      el.classList.add('done');
    }
  }
  setTimeout(typeNext, 2000);
}
initQuote();
</script>
